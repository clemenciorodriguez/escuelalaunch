name: Binance Launchpool Scraper

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 1 — Scraper (proyectos Launchpool)
        run: python scraper.py

      - name: 2 — Paper Bot (detecta listings y registra compras ficticias)
        run: python bot_paper.py

      - name: 3 — Tracker (actualiza precios y P&L)
        run: python tracker.py

      - name: Commit y push data/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "update: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
